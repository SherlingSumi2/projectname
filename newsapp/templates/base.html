<!DOCTYPE html>
<html>
<head>
    <title>News Portal</title>
    <style>
        body { font-family: Arial; }
        .container { display: grid; grid-template-columns: 25% 50% 25%; gap: 20px; }
        img { width: 100%; }
        .card { margin-bottom: 20px; }
        nav ul { display: flex; list-style: none; gap: 15px; }
    </style>
</head>
<body>

<nav>
    <ul>
        <li><a href="/">Home</a></li>
        {% for cat in categories %}
        <li><a href="{% url 'category' cat.slug %}">{{ cat.name }}</a></li>
        {% endfor %}
    </ul>
</nav>

{% block content %}{% endblock %}

</body>
</html>
